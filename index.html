<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Helpy</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <h1>Helpy</h1>
      <button id="adminBtn" class="icon-btn">⚙️</button>
    </header>

    <section id="userStats" class="user-stats"></section>

    <main>
      <section id="cardsGrid" class="cards-grid"></section>
    </main>
  </div>

  <section id="adminView" class="admin-view hidden">
    <div class="admin-panel">
      <div class="admin-head">
        <div>
          <h2>Admin</h2>
          <p>Hantera Helpys</p>
        </div>

        <div class="admin-head-actions">
          <button id="closeAdminBtn" class="small-btn">Stäng adminvy</button>
          <button id="logoutBtn" class="small-btn white">Logga ut</button>
          <button id="addBtn" class="new-btn">+ Ny Helpy</button>
        </div>
      </div>

      <div class="admin-stats">
        <div><strong id="statTotalCount">0</strong><span id="statTotalValue">tot. 0 kr</span><p>Antal Helpys</p></div>
        <div><strong id="statDoneCount">0</strong><span id="statDoneValue">tot. 0 kr</span><p>Färdiga Helpys</p></div>
        <div><strong id="statPaidCount">0</strong><span id="statPaidValue">tot. 0 kr</span><p>Utbetalda</p></div>
      </div>

      <div class="tabs">
        <button class="tab active" data-tab="current">Aktuella</button>
        <button class="tab" data-tab="payout">Betala ut</button>
        <button class="tab" data-tab="history">Historik</button>
      </div>
    </div>

    <div id="adminList" class="admin-list"></div>
  </section>

  <div id="modal" class="modal hidden">
    <div class="modal-box">
      <button id="closeModal" class="modal-close">×</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script type="module" src="script.js"></script>
</body>
</html>
