<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <title>Helpy</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="header">
  <button id="adminGear" class="gear" aria-label="Admin">⚙</button>
  <h1>Helpy</h1>
</header>

<main>
  <section id="kidsStats" class="kids-stats">
    <div class="kid-stat">
      <h3>Milo</h3>
      <p><strong id="miloPending">0 kr</strong><span>Kommande</span></p>
      <p><strong id="miloDone">0</strong><span>Antal utförda</span></p>
      <p><strong id="miloPaid">0 kr</strong><span>Utbetalt</span></p>
    </div>

    <div class="kid-stat">
      <h3>Alice</h3>
      <p><strong id="alicePending">0 kr</strong><span>Kommande</span></p>
      <p><strong id="aliceDone">0</strong><span>Antal utförda</span></p>
      <p><strong id="alicePaid">0 kr</strong><span>Utbetalt</span></p>
    </div>
  </section>

  <section id="adminPanel" class="admin-panel hidden">
    <div class="admin-top">
      <div>
        <h2>Admin</h2>
        <p>Hantera Helpys</p>
      </div>

      <div class="admin-top-actions">
        <button id="openUpload" class="plus-button" aria-label="Lägg upp ny Helpy">+</button>
        <button id="closeAdminView" class="small-button">Stäng adminvy</button>
        <button id="logoutAdmin" class="small-button">Logga ut</button>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div id="statAvailable" class="stat-number">0</div>
        <div id="statAvailableValue" class="stat-label">tot. 0 kr</div>
        <div class="stat-title">Antal Helpys</div>
      </div>
      <div class="stat-card">
        <div id="statPending" class="stat-number">0</div>
        <div id="statPendingValue" class="stat-label">tot. 0 kr</div>
        <div class="stat-title">Färdiga Helpys</div>
      </div>
      <div class="stat-card">
        <div id="statPaid" class="stat-number">0</div>
        <div id="statPaidValue" class="stat-label">tot. 0 kr</div>
        <div class="stat-title">Utbetalda</div>
      </div>
    </div>

    <div class="filters">
      <button class="filter active" data-filter="available">Aktuella</button>
      <button class="filter" data-filter="pending">Betala ut</button>
      <button class="filter" data-filter="paid">Historik</button>
    </div>

    <div id="adminList" class="admin-list"></div>
  </section>

  <section id="gallery" class="gallery">
    <p>Laddar Helpys...</p>
  </section>
</main>

<div id="pinModal" class="overlay hidden">
  <div class="popup">
    <button id="closePin" class="close">×</button>
    <h2>Admin</h2>
    <input id="pinInput" type="password" inputmode="numeric" pattern="[0-9]*" placeholder="PIN-kod" />
    <button id="pinSubmit">Öppna admin</button>
    <p id="pinError" class="error"></p>
  </div>
</div>

<div id="uploadModal" class="overlay hidden">
  <div class="popup">
    <button id="closeUpload" class="close">×</button>
    <h2>Ny Helpy</h2>
    <input id="helpyImage" type="file" accept="image/*" />
    <input id="helpyTitle" type="text" placeholder="Text, t.ex. Töm diskmaskinen" />
    <input id="helpyReward" type="number" inputmode="numeric" placeholder="Värde, t.ex. 20" />
    <button id="uploadHelpy">Publicera</button>
    <p id="uploadStatus"></p>
  </div>
</div>

<div id="editModal" class="overlay hidden">
  <div class="popup">
    <button id="closeEdit" class="close">×</button>
    <h2>Ändra Helpy</h2>
    <input id="editTitle" type="text" placeholder="Text" />
    <input id="editReward" type="number" inputmode="numeric" placeholder="Värde" />
    <input id="editImage" type="file" accept="image/*" />
    <button id="saveEdit">Spara ändring</button>
    <p id="editStatus"></p>
  </div>
</div>

<div id="helpyModal" class="overlay hidden">
  <div class="product-modal">
    <button id="closeHelpy" class="close">×</button>
    <img id="modalImage" src="" alt="" />
    <div class="product-info">
      <h2 id="modalReward"></h2>
      <p id="modalTitle"></p>
      <button id="doneButton">Färdigt!</button>
    </div>
  </div>
</div>

<div id="doneModal" class="overlay hidden">
  <div class="popup">
    <button id="closeDone" class="close">×</button>
    <h2>Klarmarkera</h2>
    <select id="donePerson">
      <option value="">Välj namn</option>
      <option value="Milo">Milo</option>
      <option value="Alice">Alice</option>
    </select>
    <textarea id="doneComment" placeholder="Kommentar, frivilligt"></textarea>
    <button id="sendDone">Skicka</button>
    <p id="doneStatus"></p>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<script type="module" src="app.js"></script>
</body>
</html>
